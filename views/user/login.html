<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Collecte Linguistique Wolof</title>
  <link rel="stylesheet" href="./style2.css">
</head>
<body>

  <div class="header">
    <h1>Recensement de données Wolof en Français</h1>
    <p>Connectez-vous pour soumettre vos enregistrements.</p>
  </div>

  <main>
    <div class="login-card">
      <h2>Connexion</h2>
      <p class="subtitle">Entrez votre email et votre numéro de téléphone pour accéder à l'interface.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="identifier">Email ou numéro de téléphone</label>
          <input type="text" id="identifier" name="identifier" placeholder="email@example.com ou +221 77 123 45 67" autocomplete="off">
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">Se connecter</button>
      </form>

      <div class="back-link">
        <a href="./">← Retour à l'accueil</a>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 Projet IA Wolof par SOLID Afrique | Collecte linguistique</p>
  </footer>

  <script>
    const form = document.getElementById("loginForm");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Envoi...";

      const identifier = document.getElementById('identifier').value.trim();
      if (!identifier) {
        showToast("Veuillez indiquer votre email ou votre téléphone.", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Se connecter";
        return;
      }

      const formData = new FormData();
      formData.append('identifier', identifier);

      try {
        const res = await fetch("request-verification", { method: "POST", body: formData });
        const result = await res.json();

        if (result.success) {
          if (result.otp) {
            localStorage.setItem('verificationCode', result.otp);
            localStorage.setItem('verificationIdentifier', identifier);
          }
          showToast("Code envoyé ! Redirection...", "success");
          setTimeout(() => window.location.href = result.redirect, 1300);
        } else {
          showToast(result.error || "Erreur lors de la connexion.", "error");
          submitBtn.disabled = false;
          submitBtn.textContent = "Se connecter";
        }
      } catch {
        showToast("Erreur de connexion au serveur.", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Se connecter";
      }
    });

    function showToast(message, type = "info") {
      const colors = { info: "#007bff", error: "#e74c3c", success: "#27ae60" };
      const toast  = document.createElement("div");
      toast.style.cssText = `
        position:fixed; top:20px; right:-400px; z-index:99999;
        background:${colors[type]||colors.info}; color:white;
        padding:14px 20px; border-radius:10px;
        box-shadow:0 4px 16px rgba(0,0,0,0.3);
        font-weight:600; font-size:14px; max-width:340px;
        display:flex; align-items:center; gap:10px;
        transition:right 0.4s ease; font-family:'Segoe UI',sans-serif;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.style.right = "20px", 50);
      setTimeout(() => { toast.style.right = "-400px"; setTimeout(() => toast.remove(), 500); }, 4000);
    }
  </script>
</body>
</html>
